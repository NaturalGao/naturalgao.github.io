# ===========================================
# Site Information Settings
# ===========================================

# Site creation time
since: 2018

# Custom your favicon.ico in `site/source`
favicon: /favicon.ico

# Set feed link (false | default | your feed link)
# false: disable
# default: use `atom.xml`, generator for `hexo-generator-feed`
rss: default

# ===========================================
# Menu Settings
# ===========================================
menu:
    归档: /archives
    关于: /about
    订阅: /atom.xml

archive_generator:
    per_page: 0
    yearly: false
    monthly: false
    daily: false

# ===========================================
# Widget Settings
# ===========================================
# widget function
# false: disable
# widget_custom: custom your widget
#   title: your widget title
#   content: Add your html code in here. Example: <p>testing...</p>
widget:
    Tags: true
    Categories: false
    Custom: false

widget_custom:
    title: Slogan
    content: <p>Because we can</p>

# ===========================================
# Theme Settings
# ===========================================
# theme styling
# color: Default | Mint Green | Cobalt Blue | Hot Pink | Dark Violet
theme:
    color: Default
    fancybox: false

# ===========================================
# Third Party Services Settings
# ===========================================

# Baidu Analytics
baidu_analytics:
# Google Analytics
google_analytics:

# Duoshuo
duoshuo_shortname:
# Disqus
disqus_shortname:

# Gitment
# Introduction: https://imsun.net/posts/gitment-introduction/
gitment:
    enable: false # gitment评论系统开关
    owner: NaturalGao # GitHub用户名
    repo: naturalgao.github.io # 存储评论数据的GitHub仓库的仓库名
    client_id: b3280731ffdf6d76fd46 # OAuth Application的Client ID
    client_secret: c8be25dc6a2e4b1dcafab6d6cce7242791f46a3e # OAuth Application的Client Secret
    lazy: false # 评论懒加载开关

# Gitalk
# Introduction: https://github.com/gitalk/gitalk
gitalk:
    enable: true
    owner: NaturalGao # GitHub用户名
    repo: naturalgao.github.io # 存储评论数据的GitHub仓库的仓库名
    client_id: b3280731ffdf6d76fd46 # OAuth Application的Client ID
    client_secret: c8be25dc6a2e4b1dcafab6d6cce7242791f46a3e # OAuth Application的Client Secret
    admin: ["NaturalGao"]
    distractionFreeMode: false
# ===========================================
# Version
# ===========================================
version: 1.1
